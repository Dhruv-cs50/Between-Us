<style>
  html, body { background: #FAF6EF; color: #1C1814; }
  body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-serif-i { font-family: 'Instrument Serif', serif; font-style: italic; }
  /* Subtle paper grain */
  .grain::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(rgba(28,24,20,0.025) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: multiply; opacity: 0.6;
  }
  /* Hide native scrollbar in horizontal chip rows */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  /* Tap highlight off */
  * { -webkit-tap-highlight-color: transparent; }
  /* Range input theme */
  input[type=range].thumb-coral {
    -webkit-appearance: none; appearance: none; height: 4px; background: #EADFC8; border-radius: 999px;
  }
  input[type=range].thumb-coral::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 999px;
    background: #DD7E66; border: 2px solid #FFF; box-shadow: 0 1px 4px rgba(28,24,20,0.18); cursor: pointer;
  }
  input[type=range].thumb-coral::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px;
    background: #DD7E66; border: 2px solid #FFF; box-shadow: 0 1px 4px rgba(28,24,20,0.18); cursor: pointer;
  }
  /* Subtle pulse for live dot */
  @keyframes softPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
  .pulse-dot { animation: softPulse 1.8s ease-in-out infinite; }
  /* Fade-in */
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
  .fade-up { animation: fadeUp .35s ease-out both; }
  /* Sequential reveal helper — child cards stagger in */
  .stagger > * { animation: fadeUp .42s ease-out both; }
  .stagger > *:nth-child(1) { animation-delay: 0ms; }
  .stagger > *:nth-child(2) { animation-delay: 60ms; }
  .stagger > *:nth-child(3) { animation-delay: 120ms; }
  .stagger > *:nth-child(4) { animation-delay: 180ms; }
  .stagger > *:nth-child(5) { animation-delay: 240ms; }
  .stagger > *:nth-child(6) { animation-delay: 300ms; }
  /* Soft lift on hover for cards */
  .lift { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .35s ease; }
  .lift:hover { transform: translateY(-2px); }
  /* Quick attention bounce */
  @keyframes nudge { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
  .nudge { animation: nudge .42s ease-out; }
  /* Scribbled underline used under big serif words */
  .underline-scribble {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 12'><path d='M2 7 C 30 2, 70 11, 100 6 S 180 3, 198 8' stroke='%23DD7E66' stroke-width='2.2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-size: 100% .42em;
    background-position: 0 96%;
    padding-bottom: 0.18em;
  }
  /* Sheen for the playing iframe shell */
  @keyframes drift { 0% { background-position: 0% 50% } 100% { background-position: 100% 50% } }
  .drift-bg {
    background: linear-gradient(110deg, #FBF1D6 0%, #F7DFD2 35%, #E5DEF0 70%, #DCE7DD 100%);
    background-size: 220% 220%;
    animation: drift 18s ease-in-out infinite alternate;
  }
  /* Page transitions */
  @keyframes pageEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .page-enter { animation: pageEnter .42s cubic-bezier(.2,.7,.2,1) both; }
  /* Tab-bar indicator slide */
  .tab-indicator { transition: transform .35s cubic-bezier(.2,.7,.2,1), width .35s cubic-bezier(.2,.7,.2,1); }
  /* Drawing canvas crisp */
  canvas { touch-action: none; }
  /* Selection */
  ::selection { background: #F7DFD2; color: #1C1814; }
</style>
